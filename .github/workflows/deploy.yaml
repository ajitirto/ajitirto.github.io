name: Deploy Antigravity Astro
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          # Path diubah ke root
          cache-dependency-path: 'package-lock.json'
      - name: Install & Build
        run: |
          # Perintah cd dihapus karena sudah di root
          npm install --legacy-peer-deps
          npm run build 
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Astro default build output folder adalah 'dist' di root
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
